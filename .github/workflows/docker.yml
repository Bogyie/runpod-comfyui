name: docker

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/runpod-comfyui

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - stable
        plugin_pack:
          - default-pack
        optimizations:
          - aggressive
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize image name
        run: echo "IMAGE_NAME_LC=${IMAGE_NAME,,}" >> "$GITHUB_ENV"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME_LC }}
          tags: |
            type=ref,event=branch,suffix=-${{ matrix.target }}-${{ matrix.plugin_pack }}-${{ matrix.optimizations }}
            type=ref,event=tag,suffix=-${{ matrix.target }}-${{ matrix.plugin_pack }}-${{ matrix.optimizations }}
            type=sha,prefix=sha-,suffix=-${{ matrix.target }}-${{ matrix.plugin_pack }}-${{ matrix.optimizations }}
            type=raw,value=latest-${{ matrix.target }}-${{ matrix.plugin_pack }}-${{ matrix.optimizations }},enable={{is_default_branch}}

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: ${{ matrix.target }}
          build-args: |
            INCLUDE_DEFAULT_CUSTOM_NODE_PACK=${{ matrix.plugin_pack == 'default-pack' && '1' || '0' }}
            ENABLE_AGGRESSIVE_OPTIMIZATIONS=${{ matrix.optimizations == 'aggressive' && '1' || '0' }}
          load: ${{ github.event_name == 'pull_request' }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ steps.meta.outputs.tags }}
            ${{ env.IMAGE_NAME_LC }}:pr-smoke-${{ matrix.target }}-${{ matrix.plugin_pack }}-${{ matrix.optimizations }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test imports
        if: github.event_name == 'pull_request'
        run: |
          docker run --rm ${{ env.IMAGE_NAME_LC }}:pr-smoke-${{ matrix.target }}-${{ matrix.plugin_pack }}-${{ matrix.optimizations }} \
            /bin/bash -lc 'source /opt/comfy/venv/bin/activate && python -c "import torch, xformers, server, execution; print(torch.__version__)"'
